<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divina Santos | Logistics VA Portfolio</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --light: #f8fafc;
            --text: #334155;
            --gray-bg: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text);
            background-color: #ffffff;
            padding-bottom: 60px;
        }

        /* Navigation Bar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--dark);
        }

        .logo-box {
            background: var(--dark);
            color: #ffffff;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 1.1rem;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            transition: color 0.2s;
        }

        nav ul li a:hover {
            color: var(--primary);
        }

        /* Hero Banner Section */
        .hero {
            text-align: center;
            padding: 40px 20px 20px 20px;
        }

        .hero h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--dark);
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        /* Mockup Graphic Banner */
        .banner-container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            background: linear-gradient(135deg, #cbd5e1 0%, #94a3b8 100%);
            height: 250px;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.1);
        }

        /* Clean CSS illustrations representing the mockup image elements */
        .banner-bg-elements {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }
